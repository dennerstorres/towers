<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Towers</title>
    
    <!-- Favicon padrão -->
    <link rel="icon" type="image/png" href="assets/icons/favicon-16x16.png" sizes="16x16">
    <link rel="icon" type="image/png" href="assets/icons/favicon-32x32.png" sizes="32x32">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="57x57" href="assets/icons/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="assets/icons/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="assets/icons/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="assets/icons/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="assets/icons/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="assets/icons/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="assets/icons/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-icon-180x180.png">
    
    <!-- Windows 8/10 Tile -->
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="msapplication-TileImage" content="assets/icons/ms-icon-144x144.png">
    
    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/android-icon-192x192.png">

    <!-- Google Fonts: MedievalSharp -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="assets/icons/manifest.json">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50;
            font-family: 'MedievalSharp', cursive, serif;
            color: #f1c40f;
        }

        #gameCanvas {
            display: none;
            border: 4px solid #7f8c8d;
            background-color: #27ae60;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #startScreen {
            text-align: center;
            padding: 40px;
            background-color: #2c3e50;
            border: 4px solid #7f8c8d;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
            max-width: 500px;
        }

        #startScreen h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px #c0392b;
        }

        #startScreen p {
            font-size: 1.2rem;
            color: #ecf0f1;
            margin-bottom: 30px;
        }

        #startButton {
            padding: 15px 40px;
            font-size: 24px;
            font-family: 'MedievalSharp', cursive, serif;
            background-color: #c0392b;
            color: #f1c40f;
            border: 2px solid #f1c40f;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px #922b21;
        }

        #startButton:hover {
            background-color: #e74c3c;
            transform: translateY(-2px);
            box-shadow: 0 6px #922b21;
        }

        #startButton:active {
            transform: translateY(2px);
            box-shadow: 0 2px #922b21;
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>🏰 Tower Defense</h1>
        <p>Defenda seu território construindo torres estratégicas!</p>
        <button id="startButton">Iniciar Jogo</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script type="module">
        import { Game } from './src/game/core/Game.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const startButton = document.getElementById('startButton');
            const startScreen = document.getElementById('startScreen');
            
            const game = new Game(canvas);
            
            startButton.addEventListener('click', () => {
                startScreen.style.display = 'none';
                canvas.style.display = 'block';
                game.start();
            });
        });
    </script>
</body>
</html>

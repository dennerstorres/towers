    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50;
            font-family: 'MedievalSharp', cursive, serif;
            color: #f1c40f;
        }

        #gameCanvas {
            display: none;
            max-width: 100%;
            height: auto;
            border: 8px solid #7f8c8d;
            background-color: #27ae60;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            touch-action: none;
        }

        #startScreen {
            text-align: center;
            padding: 60px;
            background-color: #2c3e50;
            background-image: radial-gradient(circle, #34495e 0%, #2c3e50 100%);
            border: 6px double #f1c40f;
            border-radius: 4px;
            box-shadow: 0 0 0 8px #7f8c8d, 0 0 50px rgba(0,0,0,0.8);
            max-width: 600px;
            position: relative;
            z-index: 1;
        }

        #startScreen::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 1px solid rgba(241, 196, 15, 0.2);
            pointer-events: none;
        }

        #startScreen h1 {
            font-size: 4.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #f1c40f;
            text-shadow: 4px 4px #c0392b, 8px 8px rgba(0,0,0,0.5);
            letter-spacing: 4px;
            line-height: 1.1;
        }

        #startScreen p {
            font-size: 1.4rem;
            color: #ecf0f1;
            margin-bottom: 40px;
            line-height: 1.6;
            font-style: italic;
        }

        #startButton {
            padding: 20px 60px;
            font-size: 28px;
            font-family: 'MedievalSharp', cursive, serif;
            background-color: #c0392b;
            color: #f1c40f;
            border: 3px solid #f1c40f;
            border-radius: 0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 6px #922b21, 0 10px 20px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        #startButton:hover {
            background-color: #e74c3c;
            transform: translateY(-3px);
            box-shadow: 0 9px #922b21, 0 15px 25px rgba(0,0,0,0.5);
        }

        #startButton:active {
            transform: translateY(3px);
            box-shadow: 0 3px #922b21, 0 5px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="startScreen">
        <h1>🏰 Tower Defense</h1>
        <p>Defenda seu território construindo torres estratégicas!</p>
        <button id="startButton">Iniciar Jogo</button>
        <button id="tavernButton" style="background-color: #34495e; margin-top: 10px;">Taverna</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script type="module">
        import { Game } from './src/game/core/Game.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const startButton = document.getElementById('startButton');
            const tavernButton = document.getElementById('tavernButton');
            const startScreen = document.getElementById('startScreen');
            
            const game = new Game(canvas);
            window.game = game; // Expondo globalmente para depuração e testes
            
            let isInitialized = false;
            game.init().then(() => {
                console.log('Game inicializado com sucesso.');
                isInitialized = true;
            }).catch(err => {
                console.error('Erro ao inicializar o jogo:', err);
            });

            startButton.addEventListener('click', () => {
                if (!isInitialized) {
                    console.warn('Aguardando inicialização do jogo...');
                    return;
                }
                startScreen.style.display = 'none';
                canvas.style.display = 'block';
                game.start();
            });

            tavernButton.addEventListener('click', () => {
                if (!isInitialized) return;
                startScreen.style.display = 'none';
                canvas.style.display = 'block';
                game.state.showTavern = true;
                game.gameLoopController.start();
            });
        });
    </script>
</body>
